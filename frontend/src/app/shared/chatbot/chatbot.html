<div class="chatbot-container fixed bottom-6 right-6 z-50">
  <!-- Toggle Button -->
  <button
    (click)="toggleChat()"
    class="chatbot-toggle w-16 h-16 rounded-full shadow-lg hover:scale-110 transition-transform flex items-center justify-center"
    aria-label="Open chat"
  >
    <svg
      *ngIf="!isOpen"
      class="w-7 h-7 text-white"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path
        d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
      ></path>
    </svg>
    <svg
      *ngIf="isOpen"
      class="w-7 h-7 text-white"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>

  <!-- Chat Window -->
  <div
    *ngIf="isOpen"
    class="chatbot-window fixed bottom-24 right-6 w-96 bg-white rounded-2xl shadow-2xl flex flex-col"
  >
    <!-- Header -->
    <div
      class="chatbot-header bg-gradient-to-r from-blue-600 to-indigo-600 p-4 rounded-t-2xl flex justify-between items-center"
    >
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 bg-white rounded-full flex items-center justify-center"
        >
          <span class="text-blue-600 font-bold">M</span>
        </div>
        <div>
          <h4 class="text-white font-semibold">MartialDev Assistant</h4>
          <span class="text-blue-100 text-sm">Online</span>
        </div>
      </div>
      <button
        (click)="closeChat()"
        class="text-white hover:text-gray-200 text-2xl"
        aria-label="Close chat"
      >
        ×
      </button>
    </div>

    <!-- Messages -->
    <div
      #messagesContainer
      class="chatbot-messages h-96 overflow-y-auto p-4 space-y-4 flex-1"
    >
      <div *ngFor="let message of messages" [ngClass]="message.sender">
        <div
          [ngClass]="message.sender === 'bot' ? 'bot-message' : 'user-message'"
          class="p-3 rounded-lg max-w-xs"
        >
          <p [innerHTML]="message.text" class="text-sm leading-relaxed"></p>
        </div>
      </div>
    </div>

    <!-- Quick Replies -->
    <div
      class="chatbot-quick-replies p-4 flex flex-wrap gap-2 border-t border-gray-200"
    >
      <button
        *ngFor="let reply of quickReplies"
        (click)="sendQuickReply(reply)"
        class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-sm hover:bg-blue-100 transition-colors"
      >
        {{ reply.label }}
      </button>
    </div>

    <!-- WhatsApp CTA -->
    <div class="p-4 border-t border-gray-200">
      <button
        (click)="openWhatsApp()"
        class="flex items-center justify-center gap-2 w-full px-4 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors font-semibold"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"
          />
        </svg>
        Chat on WhatsApp
      </button>
    </div>

    <!-- Input Form -->
    <form
      (ngSubmit)="sendMessage()"
      class="chatbot-input p-4 border-t border-gray-200 flex gap-2"
    >
      <input
        [(ngModel)]="inputValue"
        name="message"
        type="text"
        placeholder="Type your message..."
        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />
      <button
        type="submit"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
        aria-label="Send message"
      >
        <svg
          class="w-5 h-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>
</div>
